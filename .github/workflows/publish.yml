name: Publish to npm

# Publishing happens only from a GitHub release, so every published version
# is tied to a tagged commit — and npm provenance proves it.
on:
  release:
    types: [published]
  # Manual escape hatch: publish a specific tag without cutting a release.
  workflow_dispatch:
    inputs:
      npm_tag:
        description: 'npm dist-tag (use "beta" for pre-releases)'
        required: true
        default: beta
        type: choice
        options: [beta, latest]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance: lets the job mint an OIDC token that
      # Sigstore signs, proving this tarball was built from this repo and
      # this commit. Without it, `npm publish --provenance` fails.
      id-token: write

    steps:
      - uses: actions/checkout@v5
        with:
          # Some eval tests inspect git history and build-week tags, which a
          # default shallow checkout does not fetch.
          fetch-depth: 0

      # Version comes from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          # Must be the public registry for provenance to be accepted.
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Never publish something that does not pass the same gates as CI.
      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Deterministic correction-effectiveness evaluation
        run: pnpm verify:readiness

      - name: Supply-chain audit
        run: pnpm audit:package

      - name: Packed-package consumer verification
        run: pnpm verify:package-consumer

      - name: Verify package version matches the release tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${{ github.event.release.tag_name }}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json is $PKG_VERSION but the release tag is $TAG."
            echo "Bump the version, commit, and re-tag before publishing."
            exit 1
          fi
          echo "Version $PKG_VERSION matches the release tag."

      - name: Publish with provenance
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG=$([ "${{ github.event.release.prerelease }}" = "true" ] && echo beta || echo latest)
          else
            TAG="${{ inputs.npm_tag }}"
          fi
          echo "Publishing with dist-tag: $TAG"
          npm publish --provenance --access public --tag "$TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
