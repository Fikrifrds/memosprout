name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck, test, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version comes from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      # Verifies the tarball that would reach users: no install hooks, no
      # child_process/eval, only documented endpoints, dist/-only contents.
      - name: Supply-chain audit
        run: pnpm audit:package
